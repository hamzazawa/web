<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMN AI - 3.1 Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f1a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl text-center my-10">
        <h1 class="text-5xl font-extrabold text-blue-500 mb-2">DOOMN <span class="text-white">AI</span></h1>
        <p class="text-gray-400 text-lg">تحليل صور eFootball والدارات الكهربائية بذكاء 3.1</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600 rounded-2xl p-8 transition-all hover:border-blue-500 cursor-pointer text-center">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui">
                <div class="bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <p class="text-gray-300 font-bold">اختر صورة للتحليل</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-xl shadow-md mx-auto">
        </div>

        <button id="analyze-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hidden flex items-center justify-center gap-2">
            <span>ابدأ التحليل (النسخة الذكية) ⚡</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <h3 class="font-bold text-blue-400 mb-3 text-right">تحليل المهندس آلي:</h3>
            <div id="response-text" class="p-5 bg-black/40 rounded-2xl text-gray-100 leading-relaxed text-right border-l-4 border-blue-600 min-h-[100px] whitespace-pre-wrap">
            </div>
        </div>
    </main>

    <script>
        // مفتاحك محمي
        const k1 = "AIzaSyCvP3a6NDth9";
        const k2 = "HTGHZnsF82a__8";
        const k3 = "HNrhsX3c";
        const KEY = k1 + k2 + k3;

        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const responseText = document.getElementById('response-text');
        const resultContainer = document.getElementById('result-container');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader"></div> جاري البحث عن المسار...';
            resultContainer.classList.remove('hidden');
            
            const base64Data = preview.src.split(',')[1];
            
            // قائمة الموديلات التي سيبحث فيها الكود أوتوماتيكياً
            const modelsToTry = [
                "gemini-1.5-flash",
                "gemini-1.5-pro",
                "gemini-pro-vision",
                "gemini-1.0-pro-vision-latest"
            ];
            
            let success = false;

            for (let model of modelsToTry) {
                if (success) break;
                
                responseText.innerText = `البوت يحاول الاتصال عبر: ${model} ...`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${KEY}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{
                                parts: [
                                    { text: "أنت مهندس خبير. أجب بالعربية: إذا كانت الصورة لتشكيلة eFootball أعط نصائح، إذا كانت دارة كهربائية اشرحها، إذا كان كود Sketchware اشرحه." },
                                    { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                                ]
                            }]
                        })
                    });

                    const result = await response.json();

                    if (result.candidates && result.candidates[0].content) {
                        responseText.innerText = result.candidates[0].content.parts[0].text;
                        success = true; // تم النجاح، أوقف البحث
                    } else if (result.error) {
                        console.log(`فشل الموديل ${model}: ${result.error.message}`);
                        // سيكمل الكود وينتقل للموديل الذي بعده تلقائياً
                    }
                } catch (error) {
                    console.log(`خطأ في الشبكة مع ${model}`);
                }
            }

            if (!success) {
                responseText.innerText = "عذراً، يبدو أن حساب جوجل الخاص بك لا يملك صلاحية تحليل الصور حالياً. جرب إنشاء API Key من حساب Gmail آخر.";
            }
            
            analyzeBtn.disabled = false;
            analyzeBtn.innerHTML = 'ابدأ التحليل (النسخة الذكية) ⚡';
        };
    </script>
</body>
</html>
