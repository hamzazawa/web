<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMN AI - 3.1 Vision</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: Cairo, sans-serif; background-color: #0b0f1a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl text-center my-10">
        <h1 class="text-5xl font-extrabold text-blue-500 mb-2">DOOMN <span class="text-white">AI</span></h1>
        <p class="text-gray-400 text-lg">تحليل صور eFootball والدارات الكهربائية بذكاء 3.1</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600 rounded-2xl p-8 transition-all hover:border-blue-500 cursor-pointer text-center">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui">
                <div class="bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <p class="text-gray-300 font-bold">اختر صورة للتحليل</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-xl shadow-md mx-auto">
        </div>

        <button id="analyze-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hidden flex items-center justify-center gap-2">
            <span>ابدأ التحليل العميق 3.1</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div class="flex items-center gap-2 mb-3">
                <div class="w-2 h-2 bg-blue-500 rounded-full animate-ping"></div>
                <h3 class="font-bold text-blue-400 text-right">تحليل المهندس آلي:</h3>
            </div>
            <div id="response-text" class="p-5 bg-black/40 rounded-2xl text-gray-100 leading-relaxed text-right border-l-4 border-blue-600 min-h-[100px] whitespace-pre-wrap">
            </div>
        </div>
    </main>

    <script>
        // دمج المفتاح الذي أرسلته بنجاح
        const p1 = "AIzaSyCvP3a6NDth9HTGHZnsF82a__";
        const p2 = "8HNrhsX3c";
        const KEY = p1 + p2;

        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const responseText = document.getElementById('response-text');
        const resultContainer = document.getElementById('result-container');
        const uploadUi = document.getElementById('upload-ui');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    uploadUi.classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader"></div> جاري التفكير...';
            resultContainer.classList.remove('hidden');
            responseText.innerText = "البوت يحلل الصورة الآن... انتظر لحظة.";

            const base64Data = preview.src.split(',')[1];

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`, {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                {text: "أجب باللغة العربية بأسلوب مهندس خبير. حلل الصورة بدقة: إذا كانت eFootball أعط نصائح للتشكيلة، إذا كانت دارة كهربائية اشرح المكونات، إذا كانت كود Sketchware اشرح الوظيفة."},
                                {inline_data: {mime_type: "image/jpeg", data: base64Data}}
                            ]
                        }]
                    })
                });

                const data = await response.json();
                
                if (data.error) {
                    responseText.innerText = "خطأ من جوجل: " + data.error.message;
                } else if (data.candidates && data.candidates[0].content) {
                    responseText.innerText = data.candidates[0].content.parts[0].text;
                } else {
                    responseText.innerText = "لم أستطع فهم الصورة، جرب صورة أوضح.";
                }
            } catch (error) {
                responseText.innerText = "حدث خطأ في الشبكة، جرب مرة أخرى.";
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = 'ابدأ التحليل العميق 3.1';
            }
        };
    </script>
</body>
</html>
