<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check eFootball AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f1a; background-image: radial-gradient(ellipse at top, #1e3a8a 0%, #050811 80%); color: white; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.1); box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5); }
        .glass-card { background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 22px; height: 22px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .players-scroll::-webkit-scrollbar { width: 6px; }
        .players-scroll::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); border-radius: 10px; }
        .players-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center p-4 sm:p-8">

    <header class="w-full max-w-2xl text-center my-8 animate-fade-in-up">
        <h1 class="text-5xl sm:text-6xl font-extrabold mb-3 tracking-tight drop-shadow-lg">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">Check eFootball</span>
            <span class="text-white">AI Pro</span>
        </h1>
        <p class="text-gray-400 text-lg sm:text-xl font-bold">الذكاء الاصطناعي الأقوى لتقييم الحسابات</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-[2rem] p-6 sm:p-10">
        <div class="mb-6 flex flex-col items-center justify-center gap-2">
            <select id="currency-selector" class="glass-card text-white text-sm font-bold rounded-xl px-6 py-3 outline-none border border-gray-600 focus:border-blue-500 focus:ring-2 focus:ring-blue-500/50 appearance-none w-full sm:w-1/2 text-center transition-all">
                <option value="MAD" data-rate="1" data-symbol="د.م">🇲🇦 الدرهم المغربي</option>
                <option value="DZD" data-rate="13.5" data-symbol="د.ج">🇩🇿 الدينار الجزائري</option>
                <option value="EGP" data-rate="4.8" data-symbol="ج.م">🇪🇬 الجنيه المصري</option>
                <option value="TND" data-rate="0.31" data-symbol="د.ت">🇹🇳 الدينار التونسي</option>
                <option value="USD" data-rate="0.10" data-symbol="$">🇺🇸 الدولار الأمريكي</option>
            </select>
        </div>

        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600/80 rounded-3xl p-8 transition-all hover:border-blue-500 hover:bg-blue-900/10 cursor-pointer text-center min-h-[220px] flex flex-col items-center justify-center overflow-hidden">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui" class="transition-transform duration-300 group-hover:scale-105">
                <div class="bg-gradient-to-br from-blue-500/20 to-indigo-500/20 w-20 h-20 rounded-full flex items-center justify-center mx-auto mb-4 shadow-[0_0_20px_rgba(59,130,246,0.3)]">
                    <svg class="w-10 h-10 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
                </div>
                <p class="text-gray-200 font-bold text-lg">اضغط لرفع صورة التشكيلة</p>
                <p class="text-xs text-gray-500 mt-2">مسموح بفحصين (2) لكل ساعة</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-2xl shadow-2xl mx-auto z-10">
        </div>

        <button id="analyze-btn" class="w-full mt-8 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black text-xl py-4 rounded-2xl transition-all hidden flex items-center justify-center gap-3 shadow-[0_10px_20px_rgba(59,130,246,0.4)] hover:-translate-y-1">
            <span>فحص الآن 🚀</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div id="report-content" class="text-right"></div>
        </div>
    </main>

    <footer class="mt-10 text-gray-500 text-xs text-center pb-6">
        <p>جميع الحقوق محفوظة &copy; 2026 DOOMN STORE</p>
    </footer>

    <script>
        const API_KEY = "tgp_v1_Zxx1MqtPp9_0ojeMKgMrF_CDrkT6vHsvwaXdSmAgFuI";
        
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const reportContent = document.getElementById('report-content');
        const currencySelector = document.getElementById('currency-selector');

        let compressedBase64 = "";

        // 🔥 نظام إدارة حصص الفحص (حماية الرصيد) 🔥
        const MAX_SCANS = 2; // عدد الفحوصات المسموحة
        const TIME_LIMIT_MS = 60 * 60 * 1000; // 60 دقيقة بالملي ثانية

        function checkRateLimit() {
            let scans = JSON.parse(localStorage.getItem('doom_ai_scans')) || [];
            const now = Date.now();
            
            // إزالة الفحوصات القديمة التي مر عليها أكثر من ساعة
            scans = scans.filter(time => now - time < TIME_LIMIT_MS);
            localStorage.setItem('doom_ai_scans', JSON.stringify(scans));
            
            if (scans.length >= MAX_SCANS) {
                // حساب الدقائق المتبقية لفك الحظر
                const nextAvailableTime = scans[0] + TIME_LIMIT_MS;
                const minutesLeft = Math.ceil((nextAvailableTime - now) / (60 * 1000));
                return { allowed: false, minutesLeft: minutesLeft };
            }
            return { allowed: true };
        }

        function recordScan() {
            let scans = JSON.parse(localStorage.getItem('doom_ai_scans')) || [];
            scans.push(Date.now());
            localStorage.setItem('doom_ai_scans', JSON.stringify(scans));
        }
        // ---------------------------------------------

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    const img = new Image();
                    img.onload = () => {
                        const MAX_WIDTH = 800;
                        let width = img.width;
                        let height = img.height;

                        if (width > MAX_WIDTH) {
                            height = Math.round((height * MAX_WIDTH) / width);
                            width = MAX_WIDTH;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);
                        
                        compressedBase64 = canvas.toDataURL('image/jpeg', 0.8);
                        preview.src = compressedBase64;
                        
                        preview.classList.remove('hidden');
                        document.getElementById('upload-ui').classList.add('hidden');
                        analyzeBtn.classList.remove('hidden');
                        resultContainer.classList.add('hidden');
                    };
                    img.src = el.target.result;
                };
                reader.readAsDataURL(file);
            }
        };

        function formatCurrency(priceInMad) {
            const selectedOption = currencySelector.options[currencySelector.selectedIndex];
            const rate = parseFloat(selectedOption.getAttribute('data-rate'));
            const symbol = selectedOption.getAttribute('data-symbol');
            const currencyVal = selectedOption.value;
            let converted = priceInMad * rate;
            return (currencyVal === 'USD' || currencyVal === 'TND') ? converted.toFixed(2) + ' ' + symbol : Math.round(converted) + ' ' + symbol;
        }

        function calculatePlayerPriceMAD(r, isPremium) {
            let rating = parseInt(r);
            if (isNaN(rating)) return 0;
            if (rating < 100) return 1;
            if (rating === 100) return 2;
            if (rating === 101) return 3;
            if (rating === 102) return 4;
            if (rating === 103) return 5;
            if (rating === 104) return 9;
            if (isPremium) {
                if (rating === 105) return 30; if (rating === 106) return 35;
                if (rating === 107) return 40; if (rating === 108) return 45;
                if (rating >= 109) return 50;
            } else {
                if (rating === 105) return 18; if (rating === 106) return 23;
                if (rating === 107) return 26; if (rating === 108) return 29;
                if (rating >= 109) return 32;
            }
            return 1;
        }

        function getStrengthBonusMAD(s) {
            if (s < 3100) return 5; if (s >= 3100 && s < 3140) return 10;
            if (s >= 3140 && s < 3160) return 15; if (s >= 3160 && s < 3180) return 20;
            if (s >= 3180 && s < 3200) return 30; if (s >= 3200 && s < 3210) return 50;
            if (s >= 3210 && s < 3215) return 70; if (s >= 3215 && s < 3220) return 120;
            if (s >= 3220 && s < 3230) return 160; if (s >= 3230 && s < 3240) return 200;
            if (s >= 3240 && s < 3250) return 230; if (s >= 3250 && s < 3260) return 250;
            if (s >= 3260 && s < 3270) return 320; if (s >= 3270 && s < 3280) return 390;
            if (s >= 3280 && s < 3290) return 430; if (s >= 3290 && s < 3300) return 480;
            if (s >= 3300 && s < 3315) return 520; if (s >= 3315 && s < 3325) return 580;
            if (s >= 3325) return 620;
            return 0;
        }

        analyzeBtn.onclick = async () => {
            if (!compressedBase64) return;

            // التحقق من الحصة قبل إرسال الطلب
            const rateLimit = checkRateLimit();
            if (!rateLimit.allowed) {
                resultContainer.classList.remove('hidden');
                reportContent.innerHTML = `
                <div class="bg-yellow-900/40 border border-yellow-500/50 p-6 rounded-2xl text-center animate-fade-in-up">
                    <div class="text-yellow-400 mb-3">
                        <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                    </div>
                    <p class='text-white font-bold text-lg mb-2'>لقد استنفدت الحد المسموح به! ⚠️</p>
                    <p class='text-yellow-200 text-sm leading-relaxed'>للحفاظ على جودة الخدمة، يُسمح بفحص صورتين فقط كل ساعة. يرجى العودة بعد <span class="font-bold text-white bg-yellow-600/50 px-2 py-1 rounded">${rateLimit.minutesLeft} دقيقة</span> والمحاولة مجدداً.</p>
                </div>`;
                return;
            }

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader"></div> <span class="mr-2">جاري تحليل البيانات...</span>';
            resultContainer.classList.remove('hidden');
            reportContent.innerHTML = `<div class="flex flex-col items-center justify-center py-8"><div class="loader mb-4 border-t-blue-500 w-10 h-10 border-4"></div><p class="text-blue-400 font-bold">الذكاء الاصطناعي يقرأ التشكيلة الآن...</p></div>`;

            try {
                const response = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        model: "Qwen/Qwen3-VL-8B-Instruct",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "OCR Task: Extract eFootball collective strength and exactly 23 player overall ratings. Return ONLY JSON format like this: {\"strength\": 3210, \"ratings\": [102, 105...]}" },
                                { type: "image_url", image_url: { url: compressedBase64 } }
                            ]
                        }],
                        max_tokens: 300,
                        temperature: 0.1
                    })
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || "حدث خطأ غير متوقع.");

                let aiText = result.choices[0].message.content;
                let startIndex = aiText.indexOf('{');
                let endIndex = aiText.lastIndexOf('}');
                let jsonString = (startIndex !== -1 && endIndex !== -1) ? aiText.substring(startIndex, endIndex + 1) : aiText;
                
                let data = JSON.parse(jsonString);
                let strength = parseInt(data.strength) || 0;
                let playersTotalMAD = 0;
                let ratingsHtml = '';
                let highTierCount = 0;
                let validPlayersArray = [];

                if (data.ratings && Array.isArray(data.ratings)) {
                    data.ratings.forEach(r => {
                        let rNum = parseInt(r);
                        if (!isNaN(rNum)) {
                            validPlayersArray.push(rNum);
                            if (rNum > 104) highTierCount++;
                        }
                    });
                }

                if (validPlayersArray.length < 15) throw new Error(`⚠️ تم قراءة ${validPlayersArray.length} لاعب فقط. يرجى رفع صورة أوضح لتشكيلة كاملة.`);

                let isPremium = (strength > 3219 || highTierCount > 4);
                validPlayersArray.forEach(rNum => {
                    let pMad = calculatePlayerPriceMAD(rNum, isPremium);
                    playersTotalMAD += pMad;
                    ratingsHtml += `<div class="glass-card rounded-xl p-2 flex flex-col items-center justify-center border border-gray-700/50 hover:border-blue-500/80 hover:bg-blue-900/30 transition-all">
                        <span class="text-sm font-black text-green-400 drop-shadow-md">${rNum}</span>
                        <span class="text-[10px] text-gray-400 font-bold mt-1">${formatCurrency(pMad)}</span>
                    </div>`;
                });

                let bonusMAD = getStrengthBonusMAD(strength);
                let finalPriceMAD = playersTotalMAD + bonusMAD + (Math.floor(Math.random() * 3) - 1);
                if (finalPriceMAD < 0) finalPriceMAD = 0;

                // تسجيل الفحص الناجح في التخزين المحلي
                recordScan();

                reportContent.innerHTML = `
                <div class="glass rounded-[2rem] p-6 sm:p-8 border-t-4 border-blue-500 animate-fade-in-up">
                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-gradient-to-br from-blue-900/40 to-transparent p-5 rounded-2xl border border-blue-500/30 text-center relative overflow-hidden flex flex-col justify-center">
                            <div class="absolute -right-4 -top-4 w-12 h-12 bg-blue-500/20 rounded-full blur-xl"></div>
                            <p class="text-gray-400 text-[11px] mb-1 font-bold">القوة الجماعية</p>
                            <h4 class="text-4xl font-black text-blue-400 drop-shadow-md">${strength}</h4>
                        </div>
                        <div class="bg-gradient-to-br from-green-900/40 to-transparent p-5 rounded-2xl border border-green-500/30 text-center relative overflow-hidden flex flex-col justify-center">
                            <div class="absolute -left-4 -top-4 w-12 h-12 bg-green-500/20 rounded-full blur-xl"></div>
                            <p class="text-gray-400 text-[11px] mb-1 font-bold">السعر التقديري</p>
                            <h4 class="text-3xl font-black text-green-400 drop-shadow-md" dir="ltr">${formatCurrency(finalPriceMAD)}</h4>
                            ${bonusMAD > 0 ? `<p class="text-green-300/80 text-[10px] font-bold mt-1 bg-green-900/30 rounded-full px-2 mx-auto inline-block">+${formatCurrency(bonusMAD)} بونص</p>` : ''}
                        </div>
                    </div>

                    <a href="https://chat.whatsapp.com/KlSYUiZqKMX66yvrZhEiYd?mode=gi_t" target="_blank" class="w-full mb-6 bg-gradient-to-r from-[#25D366] to-[#1DA851] hover:from-[#1ebd5b] hover:to-[#178a41] text-white font-black text-lg py-3 px-4 rounded-xl flex items-center justify-center gap-3 transition-all shadow-[0_5px_15px_rgba(37,211,102,0.2)] hover:-translate-y-1 hover:shadow-[0_8px_20px_rgba(37,211,102,0.4)] border border-[#25D366]/50">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                            <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/>
                        </svg>
                        بيع الحساب 🛒
                    </a>
                    
                    <div class="text-right">
                         <p class="text-gray-300 text-[12px] mb-3 font-bold border-b border-gray-700/50 pb-2">طاقات اللاعبين المستخرجة (${validPlayersArray.length}):</p>
                         <div class="grid grid-cols-4 sm:grid-cols-5 gap-2 max-h-48 overflow-y-auto players-scroll p-1 pr-2">${ratingsHtml}</div>
                    </div>
                </div>`;
            } catch (e) {
                reportContent.innerHTML = `
                <div class="bg-red-900/40 border border-red-500/50 p-6 rounded-2xl text-center animate-fade-in-up">
                    <div class="text-red-400 mb-3">
                        <svg class="w-12 h-12 mx-auto" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
                    </div>
                    <p class='text-white font-bold text-lg mb-2'>عذراً، السيرفرات مزدحمة حالياً! ⏳</p>
                    <p class='text-red-200 text-sm leading-relaxed'>يوجد ضغط كبير على الخوادم في هذا الوقت. يرجى إعادة المحاولة بالضغط على زر "فحص الآن" مرة أخرى.</p>
                    <p class="text-[9px] text-red-400/50 mt-4" dir="ltr">${e.message}</p>
                </div>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = '<span>فحص الآن 🚀</span>';
            }
        };
    </script>
</body>
</html>
