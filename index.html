<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMN AI Pro - eFootball Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f1a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
        .price-gradient { background: linear-gradient(to bottom, #fbbf24, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .players-scroll::-webkit-scrollbar { width: 4px; }
        .players-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl text-center my-10">
        <h1 class="text-5xl font-extrabold text-blue-500 mb-2 tracking-tight">DOOMN <span class="text-white">AI Pro</span></h1>
        <p class="text-gray-400 text-lg">تقييم الحساب بناءً على طاقات اللاعبين</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600 rounded-2xl p-8 transition-all hover:border-blue-500 cursor-pointer text-center">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui">
                <div class="bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <p class="text-gray-300 font-bold">اختر صورة التشكيلة</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-xl shadow-md mx-auto">
        </div>

        <button id="analyze-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hidden flex items-center justify-center gap-2">
            <span>ابدأ التحليل +13 🚀 (تسعير اللاعبين)</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div id="report-content" class="text-right"></div>
        </div>
    </main>

    <script>
        const k1 = "AIzaSyCvP3a6NDth9";
        const k2 = "HTGHZnsF82a__8";
        const k3 = "HNrhsX3c";
        const KEY = k1 + k2 + k3;

        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const reportContent = document.getElementById('report-content');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        // خوارزمية تسعير اللاعب الواحد التي صممتها أنت!
        function calculatePlayerPrice(r) {
            let rating = parseInt(r);
            if (isNaN(rating)) return 0;
            
            if (rating < 100) return 2;
            if (rating === 100) return 3; // تحت 101
            if (rating === 101) return 4;
            if (rating === 102) return 4; // 102
            if (rating === 103) return 5; // 103
            if (rating === 104) return 7; // تحت 105 (تأويل)
            if (rating === 105) return 30; // تحت 106
            if (rating === 106) return 35; // تحت 107
            if (rating === 107) return 40; // تحت 108
            if (rating === 108) return 48; // 108
            if (rating > 108) return 52;   // فوق 108 أو 107
            
            return 2;
        }

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader w-5 h-5 border-2 rounded-full"></div> جاري المعالجة...';
            resultContainer.classList.remove('hidden');
            
            reportContent.innerHTML = `
                <div class="text-center p-5">
                    <p class="text-blue-400 font-bold mb-2">البوت يستخرج طاقات 23 لاعباً ⚡</p>
                    <p class="text-gray-500 text-xs">يرجى الانتظار...</p>
                </div>
            `;

            const base64Data = preview.src.split(',')[1];

            try {
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
                
                // تحديث الأوامر: طلب المصفوفة كأرقام فقط لـ 23 لاعباً
                const promptText = `
                استخرج بيانات التشكيلة بدقة وأرجعها بصيغة JSON فقط:
                {
                    "strength": "رقم القوة الجماعية",
                    "ratings": [أرقام طاقات اللاعبين هنا كمصفوفة],
                    "note": "ملاحظة سريعة بالعربية"
                }
                مهم جداً: استخرج أرقام طاقات جميع اللاعبين في الصورة (الأساسيين ودكة البدلاء، عادة 23 لاعباً). المصفوفة يجب أن تحتوي على الأرقام فقط (مثل: [102, 105, 100, 99]). لا تستخرج أسماء اللاعبين.
                `;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                            ]
                        }],
                        generationConfig: {
                            response_mime_type: "application/json"
                        }
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error?.message || "فشل الاتصال");
                }

                let aiText = result.candidates[0].content.parts[0].text;
                let parsedData = JSON.parse(aiText);
                
                // حساب السعر النهائي بناءً على كل لاعب!
                let totalPrice = 0;
                let ratingsHtml = '';
                let playerCount = 0;

                if (parsedData.ratings && Array.isArray(parsedData.ratings)) {
                    parsedData.ratings.forEach(rating => {
                        let pPrice = calculatePlayerPrice(rating);
                        totalPrice += pPrice;
                        playerCount++;
                        
                        ratingsHtml += `
                        <div class="bg-gray-800/80 border border-gray-700 rounded-lg p-2 flex flex-col justify-center items-center shadow-sm">
                            <span class="text-sm font-black text-green-400 bg-green-400/10 px-2 py-0.5 rounded w-full text-center">${rating}</span>
                            <span class="text-[10px] text-gray-400 mt-1">${pPrice} د.م</span>
                        </div>`;
                    });
                } else {
                    ratingsHtml = '<p class="text-gray-500 text-xs text-center w-full col-span-4">لم يقم بقراءة الطاقات.</p>';
                }

                let dollarEquivalent = (totalPrice / 10).toFixed(1) + "$";

                reportContent.innerHTML = `
                <div class="glass rounded-3xl p-6 border-t-4 border-blue-500 animate-fade-in-up shadow-2xl max-w-md mx-auto text-center">
                    <div class="mb-4">
                        <span class="bg-blue-500 text-white text-xs font-bold px-3 py-1 rounded-full uppercase">DOOMN Verified</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-blue-600/20 rounded-2xl p-4 border border-blue-500/30">
                            <p class="text-gray-400 text-[10px] mb-1">القوة الجماعية</p>
                            <h4 class="text-3xl font-black text-blue-400">${parsedData.strength}</h4>
                        </div>
                        <div class="bg-yellow-500/10 rounded-2xl p-4 border border-yellow-500/30">
                            <p class="text-gray-400 text-[10px] mb-1">سعر الحساب الفعلي</p>
                            <h4 class="text-3xl font-black text-yellow-500">${totalPrice} <span class="text-sm">د.م</span></h4>
                            <p class="text-blue-400 text-[10px] mt-1 font-bold">(${dollarEquivalent})</p>
                        </div>
                    </div>

                    <div class="mb-6 text-right">
                        <h5 class="text-gray-300 text-sm font-bold mb-3 border-b border-gray-700 pb-2 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                طاقات اللاعبين المستخرجة:
                            </div>
                            <span class="text-xs bg-gray-700 px-2 py-1 rounded text-white">${playerCount} لاعب</span>
                        </h5>
                        <div class="grid grid-cols-4 gap-2 max-h-48 overflow-y-auto players-scroll p-1">
                            ${ratingsHtml}
                        </div>
                    </div>

                    <div class="bg-black/20 rounded-2xl p-4 text-right border border-white/5">
                        <p class="text-gray-500 text-[10px] mb-1">توصية المهندس آلي</p>
                        <p class="text-gray-300 text-xs leading-relaxed">${parsedData.note}</p>
                    </div>
                </div>`;
                
            } catch (error) {
                reportContent.innerHTML = `
                <div class="bg-red-900/50 border border-red-500 rounded-xl p-5 text-center">
                    <p class='text-red-400 font-bold'>عذراً، فشل التحليل!</p>
                    <p class='text-gray-300 text-xs mt-2'>جرب مرة أخرى.</p>
                </div>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = 'ابدأ التحليل +13 🚀 (تسعير اللاعبين)';
            }
        };
    </script>
</body>
</html>
