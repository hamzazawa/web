<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check eFootball AI Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f1a; background-image: radial-gradient(ellipse at top, #1e3a8a 0%, #0b0f1a 70%); color: white; min-height: 100vh; }
        .glass { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(8px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .loader { border: 3px solid rgba(255, 255, 255, 0.1); border-top: 3px solid #3b82f6; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .animate-fade-in-up { animation: fade-in-up 0.6s ease-out forwards; }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .players-scroll::-webkit-scrollbar { width: 5px; }
        .players-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="flex flex-col items-center p-4 sm:p-8">

    <header class="w-full max-w-2xl text-center my-8 animate-fade-in-up">
        <h1 class="text-5xl sm:text-6xl font-extrabold mb-3 tracking-tight">
            <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-400 to-indigo-500">Check eFootball</span>
            <span class="text-white">AI Pro</span>
        </h1>
        <p class="text-gray-400 text-lg sm:text-xl font-bold">تقييم الحساب الذكي عبر Together AI</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-[2rem] p-6 sm:p-10">
        <div class="mb-6 flex flex-col items-center justify-center gap-2">
            <select id="currency-selector" class="glass-card text-white text-sm font-bold rounded-xl px-6 py-3 outline-none border border-gray-600 focus:border-blue-500 appearance-none w-full sm:w-1/2 text-center">
                <option value="MAD" data-rate="1" data-symbol="د.م">🇲🇦 الدرهم المغربي</option>
                <option value="DZD" data-rate="13.5" data-symbol="د.ج">🇩🇿 الدينار الجزائري</option>
                <option value="EGP" data-rate="4.8" data-symbol="ج.م">🇪🇬 الجنيه المصري</option>
                <option value="TND" data-rate="0.31" data-symbol="د.ت">🇹🇳 الدينار التونسي</option>
                <option value="USD" data-rate="0.10" data-symbol="$">🇺🇸 الدولار الأمريكي</option>
            </select>
        </div>

        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600/80 rounded-3xl p-8 transition-all hover:border-blue-500 hover:bg-blue-900/10 cursor-pointer text-center min-h-[200px] flex flex-col items-center justify-center">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui">
                <div class="bg-blue-500/20 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                    <svg class="w-8 h-8 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5m-13.5-9L12 3m0 0l4.5 4.5M12 3v13.5"/></svg>
                </div>
                <p class="text-gray-200 font-bold">رفع صورة التشكيلة</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-2xl shadow-2xl mx-auto z-10">
        </div>

        <button id="analyze-btn" class="w-full mt-8 bg-gradient-to-r from-blue-600 to-indigo-600 hover:from-blue-500 hover:to-indigo-500 text-white font-black text-lg py-4 rounded-2xl transition-all hidden flex items-center justify-center gap-3">
            <span>ابدأ التقييم الآن 🚀</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div id="report-content" class="text-right"></div>
        </div>
    </main>

    <footer class="mt-10 text-gray-500 text-xs text-center pb-6">
        <p>&copy; 2026 Check eFootball AI Pro - Hamza El Kiri</p>
    </footer>

    <script>
        const API_KEY = "tgp_v1_J4nQiM2_27ij07zJ7PbSFZq3OWgNNw-8sKmdbXLv09c";
        
        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const reportContent = document.getElementById('report-content');
        const currencySelector = document.getElementById('currency-selector');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        function formatCurrency(priceInMad) {
            const selectedOption = currencySelector.options[currencySelector.selectedIndex];
            const rate = parseFloat(selectedOption.getAttribute('data-rate'));
            const symbol = selectedOption.getAttribute('data-symbol');
            const currencyVal = selectedOption.value;
            let converted = priceInMad * rate;
            return (currencyVal === 'USD' || currencyVal === 'TND') ? converted.toFixed(2) + ' ' + symbol : Math.round(converted) + ' ' + symbol;
        }

        function calculatePlayerPriceMAD(r, isPremium) {
            let rating = parseInt(r);
            if (isNaN(rating)) return 0;
            if (rating < 100) return 1;
            if (rating === 100) return 2;
            if (rating === 101) return 3;
            if (rating === 102) return 4;
            if (rating === 103) return 5;
            if (rating === 104) return 9;
            if (isPremium) {
                if (rating === 105) return 30; if (rating === 106) return 35;
                if (rating === 107) return 40; if (rating === 108) return 45;
                if (rating >= 109) return 50;
            } else {
                if (rating === 105) return 18; if (rating === 106) return 23;
                if (rating === 107) return 26; if (rating === 108) return 29;
                if (rating >= 109) return 32;
            }
            return 1;
        }

        function getStrengthBonusMAD(s) {
            if (s < 3100) return 5; if (s >= 3100 && s < 3140) return 10;
            if (s >= 3140 && s < 3160) return 15; if (s >= 3160 && s < 3180) return 20;
            if (s >= 3180 && s < 3200) return 30; if (s >= 3200 && s < 3210) return 50;
            if (s >= 3210 && s < 3215) return 70; if (s >= 3215 && s < 3220) return 120;
            if (s >= 3220 && s < 3230) return 160; if (s >= 3230 && s < 3240) return 200;
            if (s >= 3240 && s < 3250) return 230; if (s >= 3250 && s < 3260) return 250;
            if (s >= 3260 && s < 3270) return 320; if (s >= 3270 && s < 3280) return 390;
            if (s >= 3280 && s < 3290) return 430; if (s >= 3290 && s < 3300) return 480;
            if (s >= 3300 && s < 3315) return 520; if (s >= 3315 && s < 3325) return 580;
            if (s >= 3325) return 620;
            return 0;
        }

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader"></div> <span class="mr-2">جاري المعالجة...</span>';
            resultContainer.classList.remove('hidden');
            reportContent.innerHTML = `<p class="text-blue-400 font-bold text-center py-10 italic">يتم فحص التشكيلة عبر Together AI...</p>`;

            try {
                const response = await fetch("https://api.together.xyz/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        // 🔥 هذا هو الموديل الصحيح والموفر على السيرفرات العامة 🔥
                        model: "meta-llama/Llama-Vision-Free",
                        messages: [{
                            role: "user",
                            content: [
                                { type: "text", text: "OCR Task: Extract collective strength and player ratings (11 starters + 12 subs). Return ONLY JSON: {\"strength\": 3210, \"ratings\": [102, 105...], \"note\": \"Brief Arabic comment\"}" },
                                { type: "image_url", image_url: { url: preview.src } }
                            ]
                        }],
                        max_tokens: 300 // الحد من الاستهلاك للحفاظ على الرصيد
                    })
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || "حدث خطأ غير متوقع.");

                let aiText = result.choices[0].message.content;
                
                let jsonString = aiText;
                let startIndex = aiText.indexOf('{');
                let endIndex = aiText.lastIndexOf('}');
                if (startIndex !== -1 && endIndex !== -1) {
                    jsonString = aiText.substring(startIndex, endIndex + 1);
                } else {
                    throw new Error("حدث خطأ في استخراج البيانات من السيرفر. الرد: " + aiText);
                }
                
                let data = JSON.parse(jsonString);
                let strength = parseInt(data.strength) || 0;
                let playersTotalMAD = 0;
                let ratingsHtml = '';
                let highTierCount = 0;
                let sumRatings = 0;
                let validPlayersArray = [];

                if (data.ratings && Array.isArray(data.ratings)) {
                    data.ratings.forEach(r => {
                        let rNum = parseInt(r);
                        if (!isNaN(rNum)) {
                            validPlayersArray.push(rNum);
                            if (rNum > 104) highTierCount++;
                            sumRatings += rNum;
                        }
                    });
                }

                if (validPlayersArray.length < 15) throw new Error(`⚠️ تم مسح ${validPlayersArray.length} لاعب فقط. يرجى رفع صورة واضحة.`);

                let isPremium = (strength > 3219 || highTierCount > 4);
                validPlayersArray.forEach(rNum => {
                    let pMad = calculatePlayerPriceMAD(rNum, isPremium);
                    playersTotalMAD += pMad;
                    ratingsHtml += `<div class="glass-card rounded-xl p-2 flex flex-col items-center justify-center border border-gray-700 hover:border-blue-500">
                        <span class="text-sm font-black text-green-400">${rNum}</span>
                        <span class="text-[9px] text-gray-300 mt-1">${formatCurrency(pMad)}</span>
                    </div>`;
                });

                let bonusMAD = getStrengthBonusMAD(strength);
                let finalPriceMAD = playersTotalMAD + bonusMAD + (Math.floor(Math.random() * 3) - 1);
                if (finalPriceMAD < 0) finalPriceMAD = 0;

                reportContent.innerHTML = `
                <div class="glass rounded-[2rem] p-6 sm:p-8 border-t-4 border-blue-500 animate-fade-in-up">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-blue-900/40 p-5 rounded-2xl border border-blue-500/30 text-center">
                            <p class="text-gray-400 text-[10px] mb-1 uppercase">قوة الفريق</p>
                            <h4 class="text-4xl font-black text-blue-400 tracking-tighter">${strength}</h4>
                        </div>
                        <div class="bg-yellow-900/40 p-5 rounded-2xl border border-yellow-500/30 text-center">
                            <p class="text-gray-400 text-[10px] mb-1 uppercase">قيمة الحساب</p>
                            <h4 class="text-3xl font-black text-yellow-400" dir="ltr">${formatCurrency(finalPriceMAD)}</h4>
                            ${bonusMAD > 0 ? `<p class="text-green-400 text-[9px] mt-1 font-bold">+${formatCurrency(bonusMAD)} بونص</p>` : ''}
                        </div>
                    </div>
                    <div class="text-right mb-2">
                         <p class="text-gray-400 text-[11px] mb-3 font-bold uppercase border-b border-gray-700 pb-2">تفاصيل الطاقات (${validPlayersArray.length}):</p>
                         <div class="grid grid-cols-4 sm:grid-cols-5 gap-2 max-h-48 overflow-y-auto players-scroll p-1">${ratingsHtml}</div>
                    </div>
                    <div class="bg-black/20 p-4 rounded-2xl text-right text-xs text-gray-300 border border-white/5 italic">"${data.note || "تم التقييم بنجاح."}"</div>
                </div>`;
            } catch (e) {
                reportContent.innerHTML = `
                <div class="bg-red-900/30 border border-red-500/50 p-6 rounded-2xl text-center">
                    <p class='text-red-300 font-bold'>${e.message}</p>
                </div>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = '<span>فحص تشكيلة أخرى 🚀</span>';
            }
        };
    </script>
</body>
</html>
