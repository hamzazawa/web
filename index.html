<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMN AI Pro - eFootball Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f1a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
        .players-scroll::-webkit-scrollbar { width: 4px; }
        .players-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl text-center my-10">
        <h1 class="text-5xl font-extrabold text-blue-500 mb-2 tracking-tight">DOOMN <span class="text-white">AI Pro</span></h1>
        <p class="text-gray-400 text-lg">تقييم الحساب الذكي (النسخة المستقرة)</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600 rounded-2xl p-8 transition-all hover:border-blue-500 cursor-pointer text-center">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui">
                <div class="bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <p class="text-gray-300 font-bold">اختر صورة التشكيلة</p>
                <p class="text-gray-500 text-xs mt-2">يفضل رفع صورة بجودة أصلية لضمان قراءة دكة البدلاء</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-xl shadow-md mx-auto">
        </div>

        <button id="analyze-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hidden flex items-center justify-center gap-2">
            <span>تحليل التشكيلة الآن 🚀</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div id="report-content" class="text-right"></div>
        </div>
    </main>

    <script>
        const g1 = "gsk_d4SyISmPwMOZ7cEv556f";
        const g2 = "WGdyb3FYs7WEmwSvMlCdKWjCWDkoNWNT";
        const API_KEY = g1 + g2;

        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const reportContent = document.getElementById('report-content');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        function calculatePlayerPrice(r, isPremium) {
            let rating = parseInt(r);
            if (isNaN(rating)) return 0;
            
            if (rating < 100) return 1;
            if (rating === 100) return 2;
            if (rating === 101) return 3;
            if (rating === 102) return 4;
            if (rating === 103) return 5;
            if (rating === 104) return 9;
            
            if (isPremium) {
                if (rating === 105) return 30;
                if (rating === 106) return 35;
                if (rating === 107) return 40;
                if (rating === 108) return 45;
                if (rating >= 109) return 50;
            } else {
                if (rating === 105) return 18;
                if (rating === 106) return 23;
                if (rating === 107) return 26;
                if (rating === 108) return 29;
                if (rating >= 109) return 32;
            }
            return 1;
        }

        function getStrengthBonus(s) {
            if (s < 3100) return 5;
            if (s >= 3100 && s < 3140) return 10;
            if (s >= 3140 && s < 3160) return 15;
            if (s >= 3160 && s < 3180) return 20;
            if (s >= 3180 && s < 3200) return 30;
            if (s >= 3200 && s < 3210) return 50;
            if (s >= 3210 && s < 3215) return 70;
            if (s >= 3215 && s < 3220) return 120;
            if (s >= 3220 && s < 3230) return 160;
            if (s >= 3230 && s < 3240) return 200;
            if (s >= 3240 && s < 3250) return 230;
            if (s >= 3250 && s < 3260) return 250;
            if (s >= 3260 && s < 3270) return 320;
            if (s >= 3270 && s < 3280) return 390;
            if (s >= 3280 && s < 3290) return 430;
            if (s >= 3290 && s < 3300) return 480;
            if (s >= 3300 && s < 3315) return 520;
            if (s >= 3315 && s < 3325) return 580;
            if (s >= 3325) return 620;
            return 0;
        }

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader w-5 h-5 border-2 rounded-full"></div> جاري المعالجة...';
            resultContainer.classList.remove('hidden');
            reportContent.innerHTML = "<p class='text-blue-400 p-5 text-center font-bold'>البوت يستخرج البيانات الآن... يرجى الانتظار.</p>";

            const base64Image = preview.src;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        // 🔥 الموديل الرسمي والمستقر والمجاني من Groq 🔥
                        model: "llama-3.2-11b-vision-instruct",
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: "Identify eFootball collective strength number. Then extract ALL visible player overall ratings (numbers between 90 and 110). Find as many as possible, ideally 23. Return valid JSON only: {\"strength\": 3210, \"ratings\": [102, 105, 100...], \"note\": \"Arabic review\"}" },
                                    { type: "image_url", image_url: { url: base64Image } }
                                ]
                            }
                        ]
                    })
                });

                const result = await response.json();
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ` + (result.error?.message || JSON.stringify(result)));
                }

                let aiText = result.choices[0].message.content;
                
                let jsonString = aiText;
                let startIndex = aiText.indexOf('{');
                let endIndex = aiText.lastIndexOf('}');
                
                if (startIndex !== -1 && endIndex !== -1) {
                    jsonString = aiText.substring(startIndex, endIndex + 1);
                } else {
                    throw new Error("لم يتم العثور على بيانات JSON.");
                }

                let data = JSON.parse(jsonString);
                let strength = parseInt(data.strength) || 0;
                let playersTotal = 0;
                let ratingsHtml = '';
                
                let highTierCount = 0;
                let sumRatings = 0;
                let validPlayersArray = [];

                if (data.ratings && Array.isArray(data.ratings)) {
                    data.ratings.forEach(r => {
                        let rNum = parseInt(r);
                        if (!isNaN(rNum) && rNum > 70 && rNum < 120) { 
                            validPlayersArray.push(rNum);
                            if (rNum > 104) highTierCount++;
                            sumRatings += rNum;
                        }
                    });
                }

                // 🔥 المرونة الذكية: نقبل التحليل إذا وجد 15 لاعباً على الأقل 🔥
                if (validPlayersArray.length < 15) {
                    throw new Error(`⚠️ الصورة غير واضحة للذكاء الاصطناعي! تمكن من قراءة ${validPlayersArray.length} لاعبين فقط. يرجى رفع صورة بجودة أعلى.`);
                }

                let isPremium = (strength > 3219 || highTierCount > 4);

                validPlayersArray.forEach(rNum => {
                    let p = calculatePlayerPrice(rNum, isPremium);
                    playersTotal += p;
                    ratingsHtml += `<div class="bg-gray-800/80 border border-gray-700 rounded-lg p-2 text-center">
                        <span class="text-xs font-black text-green-400">${rNum}</span><br>
                        <span class="text-[9px] text-gray-400">${p}د.م</span>
                    </div>`;
                });

                let avg = (sumRatings / validPlayersArray.length).toFixed(1);
                let avgText = "";
                let avgColor = "";

                if (avg < 102) { avgText = "ضعيف"; avgColor = "text-red-400"; }
                else if (avg >= 102 && avg < 103) { avgText = "متوسط"; avgColor = "text-yellow-400"; }
                else if (avg >= 103 && avg < 104) { avgText = "قوي"; avgColor = "text-blue-400"; }
                else if (avg >= 104 && avg < 106) { avgText = "قوي جداً"; avgColor = "text-purple-400"; }
                else if (avg >= 106) { avgText = "ضخم للغاية"; avgColor = "text-green-400"; }

                let bonus = getStrengthBonus(strength);
                let jitter = Math.floor(Math.random() * 3) - 1; 
                let finalPrice = playersTotal + bonus + jitter;
                if(finalPrice < 0) finalPrice = 0; 

                // رسالة تنبيه لطيفة إذا لم يتم قراءة كل اللاعبين
                let warningHtml = validPlayersArray.length < 23 
                    ? `<div class="bg-yellow-900/30 border border-yellow-600/50 text-yellow-500 text-[10px] p-2 rounded-xl mb-4 text-center">
                        ⚠️ لاحظ البوت ${validPlayersArray.length} لاعباً فقط بوضوح من أصل 23. (تم تقييم الظاهرين فقط).
                       </div>` 
                    : ``;

                reportContent.innerHTML = `
                <div class="glass rounded-3xl p-6 border-t-4 border-blue-500 animate-fade-in-up text-center max-w-md mx-auto">
                    
                    ${warningHtml}

                    <div class="grid grid-cols-2 gap-4 mb-4">
                        <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20">
                            <p class="text-gray-400 text-[10px] mb-1">القوة الجماعية</p>
                            <h4 class="text-3xl font-black text-blue-400">${strength}</h4>
                        </div>
                        <div class="bg-yellow-500/10 p-4 rounded-2xl border border-yellow-500/20">
                            <p class="text-gray-400 text-[10px] mb-1">السعر النهائي</p>
                            <h4 class="text-3xl font-black text-yellow-500">${finalPrice} <span class="text-sm">د.م</span></h4>
                            ${bonus > 0 ? `<p class="text-green-400 text-[9px] font-bold">+${bonus} علاوة</p>` : ''}
                        </div>
                    </div>

                    <div class="bg-gray-800/40 p-4 rounded-2xl border border-gray-700/50 mb-6 flex justify-between items-center">
                        <div class="text-right">
                            <p class="text-gray-400 text-[10px] mb-1">مجموع الطاقات:</p>
                            <h5 class="text-lg font-bold text-gray-200">${sumRatings} <span class="text-[10px] text-gray-500">نقطة</span></h5>
                        </div>
                        <div class="text-left border-r border-gray-600 pr-4">
                            <p class="text-gray-400 text-[10px] mb-1">تقييم اللاعبين:</p>
                            <h5 class="text-xl font-black text-white">${avg} <span class="text-xs ${avgColor}">${avgText}</span></h5>
                        </div>
                    </div>

                    <div class="text-right mb-4">
                         <p class="text-gray-400 text-[10px] mb-2 font-bold uppercase">الطاقات المستخرجة (${validPlayersArray.length}):</p>
                         <div class="grid grid-cols-4 gap-2 max-h-40 overflow-y-auto players-scroll p-1">${ratingsHtml}</div>
                    </div>
                </div>`;
            } catch (e) {
                reportContent.innerHTML = `
                <div class="bg-red-900/40 border border-red-500 p-4 rounded-xl text-right">
                    <p class='text-red-400 font-bold mb-2 text-sm'>❌ سجل الأخطاء:</p>
                    <div class='bg-black p-3 rounded-lg overflow-x-auto text-left' dir="ltr">
                        <code class='text-green-400 text-xs font-mono whitespace-pre-wrap break-words'>${e.message}</code>
                    </div>
                </div>`;
                console.error(e);
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = 'تحليل التشكيلة الآن 🚀';
            }
        };
    </script>
</body>
</html>
