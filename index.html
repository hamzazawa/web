<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMN AI Pro - eFootball Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f1a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
        .players-scroll::-webkit-scrollbar { width: 4px; }
        .players-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl text-center my-10">
        <h1 class="text-5xl font-extrabold text-blue-500 mb-2 tracking-tight">DOOMN <span class="text-white">AI Pro</span></h1>
        <p class="text-gray-400 text-lg">تقييم الحساب بناءً على طاقات اللاعبين (Groq ⚡)</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600 rounded-2xl p-8 transition-all hover:border-blue-500 cursor-pointer text-center">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui">
                <div class="bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <p class="text-gray-300 font-bold">اختر صورة التشكيلة</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-xl shadow-md mx-auto">
        </div>

        <button id="analyze-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hidden flex items-center justify-center gap-2">
            <span>تحليل التشكيلة الآن 🚀</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div id="report-content" class="text-right"></div>
        </div>
    </main>

    <script>
        // مفتاح Groq الخاص بك
        const g1 = "gsk_d4SyISmPwMOZ7cEv556f";
        const g2 = "WGdyb3FYs7WEmwSvMlCdKWjCWDkoNWNT";
        const API_KEY = g1 + g2;

        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const reportContent = document.getElementById('report-content');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        function calculatePlayerPrice(r, strength) {
            let rating = parseInt(r);
            if (isNaN(rating)) return 0;
            let price = 2;
            if (rating < 100) price = 2;
            else if (rating === 100) price = 3;
            else if (rating === 101) price = 4;
            else if (rating === 102) price = 4;
            else if (rating === 103) price = 5;
            else if (rating === 104) price = 7;
            else if (rating === 105) price = 30;
            else if (rating === 106) price = 35;
            else if (rating === 107) price = 40;
            else if (rating === 108) price = 48;
            else if (rating > 108) price = 52;
            
            if (rating >= 104 && strength < 3215) price = Math.min(price, 30);
            return price;
        }

        function getStrengthBonus(s) {
            if (s >= 3200 && s < 3210) return 50;
            if (s >= 3210 && s < 3220) return 80;
            if (s >= 3220 && s < 3230) return 140;
            if (s >= 3230) return 220;
            return 0;
        }

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader w-5 h-5 border-2 rounded-full"></div> جاري المعالجة...';
            resultContainer.classList.remove('hidden');
            reportContent.innerHTML = "<p class='text-blue-400 p-5 text-center font-bold'>خوارزمية Groq تحلل التشكيلة الآن...</p>";

            const base64Image = preview.src;

            try {
                const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        // 🟢 تم التحديث هنا للموديل الأقوى والمدعوم رسمياً 🟢
                        model: "meta-llama/llama-4-scout-17b-16e-instruct",
                        messages: [
                            {
                                role: "user",
                                content: [
                                    { type: "text", text: "Identify eFootball collective strength and all visible player ratings. Return JSON only exactly like this: {\"strength\": 3210, \"ratings\": [102, 105], \"note\": \"Arabic review\"}" },
                                    { type: "image_url", image_url: { url: base64Image } }
                                ]
                            }
                        ]
                    })
                });

                const result = await response.json();
                if (!response.ok) throw new Error(result.error?.message || "Error");

                let aiText = result.choices[0].message.content;
                let jsonString = aiText.substring(aiText.indexOf('{'), aiText.lastIndexOf('}') + 1);
                let data = JSON.parse(jsonString);
                
                let s = parseInt(data.strength) || 0;
                let playersTotal = 0;
                let ratingsHtml = '';
                
                data.ratings.forEach(r => {
                    let p = calculatePlayerPrice(r, s);
                    playersTotal += p;
                    ratingsHtml += `<div class="bg-gray-800/80 border border-gray-700 rounded-lg p-2 text-center">
                        <span class="text-xs font-black text-green-400">${r}</span><br>
                        <span class="text-[9px] text-gray-400">${p}د.م</span>
                    </div>`;
                });

                let bonus = getStrengthBonus(s);
                let final = playersTotal + bonus;

                reportContent.innerHTML = `
                <div class="glass rounded-3xl p-6 border-t-4 border-blue-500 animate-fade-in-up text-center max-w-md mx-auto">
                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-blue-600/10 p-4 rounded-2xl border border-blue-500/20">
                            <p class="text-gray-400 text-[10px] mb-1">القوة</p>
                            <h4 class="text-3xl font-black text-blue-400">${s}</h4>
                        </div>
                        <div class="bg-yellow-500/10 p-4 rounded-2xl border border-yellow-500/20">
                            <p class="text-gray-400 text-[10px] mb-1">السعر النهائي</p>
                            <h4 class="text-3xl font-black text-yellow-500">${final} <span class="text-sm">د.م</span></h4>
                            ${bonus > 0 ? `<p class="text-green-400 text-[9px] font-bold">+${bonus} علاوة</p>` : ''}
                        </div>
                    </div>
                    <div class="grid grid-cols-4 gap-2 max-h-40 overflow-y-auto players-scroll mb-4">${ratingsHtml}</div>
                    <div class="bg-black/20 p-4 rounded-2xl text-right text-xs text-gray-300 border border-white/5 italic">"${data.note}"</div>
                </div>`;
            } catch (e) {
                reportContent.innerHTML = `<div class="bg-red-900/40 border border-red-500 p-5 rounded-xl text-red-400 text-xs text-center">${e.message}</div>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = 'تحليل التشكيلة الآن 🚀';
            }
        };
    </script>
</body>
</html>
