<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMN AI Pro - eFootball Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f1a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
        .price-gradient { background: linear-gradient(to bottom, #fbbf24, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .players-scroll::-webkit-scrollbar { width: 4px; }
        .players-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl text-center my-10">
        <h1 class="text-5xl font-extrabold text-blue-500 mb-2 tracking-tight">DOOMN <span class="text-white">AI Pro</span></h1>
        <p class="text-gray-400 text-lg">تحليل تشكيلات eFootball واستخراج اللاعبين</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600 rounded-2xl p-8 transition-all hover:border-blue-500 cursor-pointer text-center">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui">
                <div class="bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <p class="text-gray-300 font-bold">اختر صورة التشكيلة</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-xl shadow-md mx-auto">
        </div>

        <button id="analyze-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hidden flex items-center justify-center gap-2">
            <span>ابدأ التحليل +11 🚀 (مانع التجمد)</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div id="report-content" class="text-right"></div>
        </div>
    </main>

    <script>
        const k1 = "AIzaSyCvP3a6NDth9";
        const k2 = "HTGHZnsF82a__8";
        const k3 = "HNrhsX3c";
        const KEY = k1 + k2 + k3;

        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const reportContent = document.getElementById('report-content');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        function calculateDynamicPrice(strengthString) {
            let s = parseInt(String(strengthString).replace(/\D/g, ''));
            if (isNaN(s)) return { price: "???", dollar: "غير محدد" };

            let base = 0; let dollarEquivalent = "";
            if (s < 3100) { base = 20; dollarEquivalent = "(2$)"; }
            else if (s < 3150) { base = 60; dollarEquivalent = "(6$)"; }
            else if (s < 3170) { base = 85; dollarEquivalent = "(8.5$)"; }
            else if (s < 3190) { base = 120; dollarEquivalent = "(12$)"; }
            else if (s < 3200) { base = 160; dollarEquivalent = "(16$)"; }
            else if (s < 3210) { base = 200; dollarEquivalent = "(20$)"; }
            else if (s < 3230) { base = 250; dollarEquivalent = "(25$)"; }
            else if (s < 3240) { base = 360; dollarEquivalent = "(36$)"; }
            else if (s < 3250) { base = 520; dollarEquivalent = "(52$)"; }
            else { base = 650; dollarEquivalent = "(65$)"; }

            let jitter = Math.floor(Math.random() * 17) - 4; 
            return { price: base + jitter, dollar: dollarEquivalent };
        }

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader w-5 h-5 border-2 rounded-full"></div> جاري مسح اللاعبين...';
            resultContainer.classList.remove('hidden');
            
            // إضافة تنبيه للمستخدم بأن الأمر يأخذ وقتاً
            reportContent.innerHTML = `
                <div class="text-center p-5">
                    <p class="text-blue-400 font-bold mb-2">البوت يقرأ وجوه وطاقات اللاعبين...</p>
                    <p class="text-gray-500 text-xs">قراءة 18 لاعباً تستغرق حوالي 10 إلى 20 ثانية، يرجى الانتظار ولا تغلق الصفحة.</p>
                </div>
            `;

            const base64Data = preview.src.split(',')[1];

            try {
                const modelsRes = await fetch(`https://generativelanguage.googleapis.com/v1beta/models?key=${KEY}`);
                const modelsData = await modelsRes.json();
                
                if (!modelsRes.ok) throw new Error("مفتاح API غير صالح أو محظور.");

                const validModels = modelsData.models.filter(m => m.supportedGenerationMethods && m.supportedGenerationMethods.includes("generateContent"));
                let targetModel = validModels.find(m => m.name.includes("pro")); 
                if (!targetModel) targetModel = validModels.find(m => m.name.includes("flash"));

                const url = `https://generativelanguage.googleapis.com/v1beta/${targetModel.name}:generateContent?key=${KEY}`;
                
                // هندسة الأوامر المبسطة والواضحة
                const promptText = `
                استخرج بيانات eFootball من الصورة.
                المطلوب: القوة الجماعية (Collective Strength)، وقائمة بأهم اللاعبين وقوتهم.
                الهيكلة المطلوبة:
                {"strength": "رقم", "players": [{"name": "اسم اللاعب", "rating": "رقم"}], "note": "ملاحظة"}
                `;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                            ]
                        }],
                        // الميزة السحرية الجديدة: إجبار جوجل على إرجاع JSON نظيف
                        generationConfig: {
                            response_mime_type: "application/json"
                        }
                    })
                });

                const result = await response.json();

                // حماية من الأخطاء (مانع التجمد)
                if (!response.ok) {
                    throw new Error(result.error?.message || "رفض الخادم إتمام الطلب.");
                }

                if (result.candidates && result.candidates[0].content) {
                    let aiText = result.candidates[0].content.parts[0].text;
                    let parsedData = JSON.parse(aiText);
                    let valuation = calculateDynamicPrice(parsedData.strength);

                    let playersHtml = '';
                    if (parsedData.players && parsedData.players.length > 0) {
                        parsedData.players.forEach(player => {
                            playersHtml += `
                            <div class="bg-gray-800/80 border border-gray-700 rounded-lg p-2 flex justify-between items-center shadow-sm">
                                <span class="text-xs text-gray-200 font-bold truncate ml-2">${player.name}</span>
                                <span class="text-sm font-black text-green-400 bg-green-400/10 px-2 py-0.5 rounded">${player.rating}</span>
                            </div>`;
                        });
                    } else {
                        playersHtml = '<p class="text-gray-500 text-xs text-center w-full col-span-2">لم يتم قراءة اللاعبين بوضوح.</p>';
                    }

                    reportContent.innerHTML = `
                    <div class="glass rounded-3xl p-6 border-t-4 border-blue-500 animate-fade-in-up shadow-2xl max-w-md mx-auto text-center">
                        <div class="mb-4">
                            <span class="bg-blue-500 text-white text-xs font-bold px-3 py-1 rounded-full uppercase">DOOMN Verified</span>
                        </div>

                        <div class="grid grid-cols-2 gap-4 mb-6">
                            <div class="bg-blue-600/20 rounded-2xl p-4 border border-blue-500/30">
                                <p class="text-gray-400 text-[10px] mb-1">القوة Collective</p>
                                <h4 class="text-3xl font-black text-blue-400">${parsedData.strength}</h4>
                            </div>
                            <div class="bg-yellow-500/10 rounded-2xl p-4 border border-yellow-500/30">
                                <p class="text-gray-400 text-[10px] mb-1">السعر التقديري</p>
                                <h4 class="text-3xl font-black text-yellow-500">${valuation.price} <span class="text-sm">د.م</span></h4>
                            </div>
                        </div>

                        <div class="mb-6 text-right">
                            <h5 class="text-gray-300 text-sm font-bold mb-3 border-b border-gray-700 pb-2 flex items-center gap-2">
                                <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                                نجوم التشكيلة المستخرجين:
                            </h5>
                            <div class="grid grid-cols-2 gap-2 max-h-48 overflow-y-auto players-scroll p-1">
                                ${playersHtml}
                            </div>
                        </div>

                        <div class="bg-black/20 rounded-2xl p-4 text-right border border-white/5">
                            <p class="text-gray-500 text-[10px] mb-1">توصية المهندس آلي</p>
                            <p class="text-gray-300 text-xs leading-relaxed">${parsedData.note}</p>
                        </div>
                    </div>`;
                } else {
                    throw new Error("لم يتم استخراج البيانات المطلوبة.");
                }
            } catch (error) {
                // الآن إذا حدث أي خطأ، سيطبع هنا ولن يعلق!
                reportContent.innerHTML = `
                <div class="bg-red-900/50 border border-red-500 rounded-xl p-5 text-center">
                    <p class='text-red-400 font-bold'>عذراً، فشل التحليل!</p>
                    <p class='text-gray-300 text-xs mt-2'>السبب التقني: ${error.message}</p>
                    <p class='text-gray-400 text-xs mt-2'>جرب صورة أوضح أو انتظر دقيقة وأعد المحاولة.</p>
                </div>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = 'ابدأ التحليل +11 🚀 (إعادة المحاولة)';
            }
        };
    </script>
</body>
</html>
