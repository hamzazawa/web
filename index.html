<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMN AI Pro - eFootball Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f1a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
        .price-gradient { background: linear-gradient(to bottom, #fbbf24, #d97706); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .players-scroll::-webkit-scrollbar { width: 4px; }
        .players-scroll::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl text-center my-10">
        <h1 class="text-5xl font-extrabold text-blue-500 mb-2 tracking-tight">DOOMN <span class="text-white">AI Pro</span></h1>
        <p class="text-gray-400 text-lg">تقييم الحساب بناءً على طاقات اللاعبين</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600 rounded-2xl p-8 transition-all hover:border-blue-500 cursor-pointer text-center">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui">
                <div class="bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <p class="text-gray-300 font-bold">اختر صورة التشكيلة</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-xl shadow-md mx-auto">
        </div>

        <button id="analyze-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hidden flex items-center justify-center gap-2">
            <span>ابدأ التحليل +15 🚀 (الخوارزمية المغربية)</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div id="report-content" class="text-right"></div>
        </div>
    </main>

    <script>
        const k1 = "AIzaSyCvP3a6NDth9";
        const k2 = "HTGHZnsF82a__8";
        const k3 = "HNrhsX3c";
        const KEY = k1 + k2 + k3;

        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const reportContent = document.getElementById('report-content');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        // 1. خوارزمية تسعير اللاعب الفردي مع شرط القوة
        function calculatePlayerPrice(r, collectiveStrength) {
            let rating = parseInt(r);
            if (isNaN(rating)) return 0;
            
            let price = 2; // افتراضي

            if (rating < 100) price = 2;
            else if (rating === 100) price = 3;
            else if (rating === 101) price = 4;
            else if (rating === 102) price = 4; 
            else if (rating === 103) price = 5; 
            else if (rating === 104) price = 7; 
            else if (rating === 105) price = 30; 
            else if (rating === 106) price = 35; 
            else if (rating === 107) price = 40; 
            else if (rating === 108) price = 48; 
            else if (rating > 108) price = 52;   
            
            // تطبيق الشرط الجديد: إذا كان 104 فما فوق وفريقه ضعيف نسبياً
            if (rating >= 104 && collectiveStrength <= 3215) {
                price = Math.min(price, 30); // تحديد السقف في 30 درهم فقط
            }

            return price;
        }

        // 2. خوارزمية علاوة القوة الإجمالية
        function calculateStrengthBonus(strength) {
            let s = parseInt(strength);
            if (isNaN(s)) return 0;

            if (s >= 3200 && s < 3210) return 50;
            if (s >= 3210 && s < 3220) return 80;
            if (s >= 3220 && s < 3230) return 140;
            if (s >= 3230 && s < 3240) return 220;
            if (s >= 3240) return 350; // أضفتها لتكملة النسق المرتفع
            
            return 0; // إذا كانت أقل من 3200 لا توجد علاوة
        }

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader w-5 h-5 border-2 rounded-full"></div> جاري المعالجة...';
            resultContainer.classList.remove('hidden');
            
            reportContent.innerHTML = `
                <div class="text-center p-5">
                    <p class="text-blue-400 font-bold mb-2">البوت يستخرج الطاقات بالنموذج المجاني ⚡</p>
                    <p class="text-gray-500 text-xs">جاري تطبيق خوارزمية الأسعار الجديدة...</p>
                </div>
            `;

            const base64Data = preview.src.split(',')[1];

            try {
                // استخدام النموذج المجاني بشكل صلب (Hardcoded) لتقليل الطلبات وحماية الحصة!
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${KEY}`;
                
                const promptText = `
                استخرج بيانات التشكيلة من الصورة بدقة تامة. أرجع البيانات بصيغة JSON فقط بهذا الشكل:
                {
                    "strength": 3172,
                    "ratings": [102, 104, 102, 102, 105, 103, 101, 103, 102, 101, 102, 100, 102, 100, 102, 101, 103, 102, 102, 102, 102, 102],
                    "note": "ملاحظة فنية قصيرة بالعربية"
                }
                تأكد من وضع أرقام الطاقات فقط داخل مصفوفة ratings لجميع اللاعبين الظاهرين (حوالي 23 لاعب).
                `;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                            ]
                        }],
                        generationConfig: {
                            response_mime_type: "application/json"
                        }
                    })
                });

                const result = await response.json();

                if (!response.ok) {
                    throw new Error(result.error?.message || "رفض الخادم معالجة الصورة.");
                }

                let aiText = result.candidates[0].content.parts[0].text;
                let parsedData = JSON.parse(aiText);
                
                let collectiveStrength = parseInt(parsedData.strength) || 3000;
                let playersTotalValue = 0;
                let ratingsHtml = '';
                let playerCount = 0;

                // 3. حساب اللاعبين الفردي
                if (parsedData.ratings && Array.isArray(parsedData.ratings)) {
                    parsedData.ratings.forEach(rating => {
                        let rNum = parseInt(rating);
                        if(!isNaN(rNum)) {
                            let pPrice = calculatePlayerPrice(rNum, collectiveStrength);
                            playersTotalValue += pPrice;
                            playerCount++;
                            
                            // تلوين خاص للاعبين الغاليين
                            let priceColor = pPrice >= 30 ? "text-yellow-400" : "text-gray-400";
                            
                            ratingsHtml += `
                            <div class="bg-gray-800/80 border border-gray-700 rounded-lg p-2 flex flex-col justify-center items-center shadow-sm hover:border-blue-500 transition-colors">
                                <span class="text-sm font-black text-green-400 bg-green-400/10 px-2 py-0.5 rounded w-full text-center">${rNum}</span>
                                <span class="text-[10px] ${priceColor} font-bold mt-1">${pPrice} د.م</span>
                            </div>`;
                        }
                    });
                }

                if (playerCount === 0) throw new Error("لم يتم العثور على أرقام طاقات صالحة في الصورة.");

                // 4. إضافة علاوة القوة الإجمالية
                let strengthBonus = calculateStrengthBonus(collectiveStrength);
                let finalPrice = playersTotalValue + strengthBonus;
                let dollarEquivalent = (finalPrice / 10).toFixed(1) + "$";

                // تنسيق عرض العلاوة إذا وجدت
                let bonusHtml = strengthBonus > 0 
                    ? `<div class="text-xs text-green-400 font-bold mt-2">+${strengthBonus} د.م (علاوة القوة الجماعية)</div>` 
                    : ``;

                reportContent.innerHTML = `
                <div class="glass rounded-3xl p-6 border-t-4 border-blue-500 animate-fade-in-up shadow-2xl max-w-md mx-auto text-center">
                    <div class="mb-4">
                        <span class="bg-blue-500 text-white text-xs font-bold px-3 py-1 rounded-full uppercase">DOOMN Verified</span>
                    </div>

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <div class="bg-blue-600/20 rounded-2xl p-4 border border-blue-500/30">
                            <p class="text-gray-400 text-[10px] mb-1">القوة الجماعية</p>
                            <h4 class="text-3xl font-black text-blue-400">${parsedData.strength || "???"}</h4>
                        </div>
                        <div class="bg-yellow-500/10 rounded-2xl p-4 border border-yellow-500/30">
                            <p class="text-gray-400 text-[10px] mb-1">السعر النهائي</p>
                            <h4 class="text-3xl font-black text-yellow-500">${finalPrice} <span class="text-sm">د.م</span></h4>
                            <p class="text-blue-400 text-[10px] mt-1 font-bold">(${dollarEquivalent})</p>
                            ${bonusHtml}
                        </div>
                    </div>

                    <div class="mb-6 text-right">
                        <h5 class="text-gray-300 text-sm font-bold mb-3 border-b border-gray-700 pb-2 flex items-center justify-between">
                            <div class="flex items-center gap-2">
                                <svg class="w-4 h-4 text-blue-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                                تقييم اللاعبين (${playerCount}):
                            </div>
                            <span class="text-xs text-gray-400">مجموعهم: ${playersTotalValue} د.م</span>
                        </h5>
                        <div class="grid grid-cols-4 gap-2 max-h-48 overflow-y-auto players-scroll p-1">
                            ${ratingsHtml}
                        </div>
                    </div>

                    <div class="bg-black/20 rounded-2xl p-4 text-right border border-white/5">
                        <p class="text-gray-500 text-[10px] mb-1">توصية المهندس آلي</p>
                        <p class="text-gray-300 text-xs leading-relaxed">${parsedData.note || "تشكيلة ممتازة."}</p>
                    </div>
                </div>`;
                
            } catch (error) {
                let isQuota = error.message.toLowerCase().includes("quota") || error.message.includes("429");
                let displayError = isQuota ? "الضغط عالٍ جداً على البوت الآن، يرجى الانتظار دقيقة." : error.message;

                reportContent.innerHTML = `
                <div class="bg-red-900/50 border border-red-500 rounded-xl p-5 text-center">
                    <p class='text-red-400 font-bold mb-2'>عذراً، فشل التحليل!</p>
                    <div class='bg-black/40 p-2 rounded text-left overflow-x-auto'>
                        <p class='text-gray-300 text-[10px] font-mono' dir="ltr">${displayError}</p>
                    </div>
                </div>`;
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = 'ابدأ التحليل +15 🚀 (الخوارزمية المغربية)';
            }
        };
    </script>
</body>
</html>
