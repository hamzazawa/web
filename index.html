<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOOMN AI Pro - eFootball Report</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b0f1a; color: white; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.1); }
        .loader { border: 4px solid rgba(255, 255, 255, 0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        @keyframes fade-in-up { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in-up { animation: fade-in-up 0.5s ease-out forwards; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <header class="w-full max-w-2xl text-center my-10">
        <h1 class="text-5xl font-extrabold text-blue-500 mb-2 tracking-tight">DOOMN <span class="text-white">AI Pro</span></h1>
        <p class="text-gray-400 text-lg">تحليل تشكيلات eFootball وتقدير سعر الحساب</p>
    </header>

    <main class="w-full max-w-2xl glass rounded-3xl p-8 shadow-2xl">
        <div id="drop-area" class="relative group border-2 border-dashed border-gray-600 rounded-2xl p-8 transition-all hover:border-blue-500 cursor-pointer text-center">
            <input type="file" id="file-input" class="hidden" accept="image/*">
            <div id="upload-ui">
                <div class="bg-blue-500/10 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 group-hover:scale-110 transition-transform">
                    <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 4v16m8-8H4" stroke-width="2" stroke-linecap="round"/></svg>
                </div>
                <p class="text-gray-300 font-bold">اختر صورة للتحليل</p>
            </div>
            <img id="preview" class="hidden w-full max-h-80 object-contain rounded-xl shadow-md mx-auto">
        </div>

        <button id="analyze-btn" class="w-full mt-6 bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-2xl transition-all shadow-lg hidden flex items-center justify-center gap-2">
            <span>ابدأ التحليل +5 🚀 (النسخة الذكية)</span>
        </button>

        <div id="result-container" class="mt-8 hidden">
            <div id="report-content" class="text-right">
                جارِ معالجة البيانات...
            </div>
        </div>
    </main>

    <script>
        const k1 = "AIzaSyCvP3a6NDth9";
        const k2 = "HTGHZnsF82a__8";
        const k3 = "HNrhsX3c";
        const KEY = k1 + k2 + k3;

        const fileInput = document.getElementById('file-input');
        const preview = document.getElementById('preview');
        const analyzeBtn = document.getElementById('analyze-btn');
        const resultContainer = document.getElementById('result-container');
        const reportContent = document.getElementById('report-content');

        document.getElementById('drop-area').onclick = () => fileInput.click();

        fileInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (el) => {
                    preview.src = el.target.result;
                    preview.classList.remove('hidden');
                    document.getElementById('upload-ui').classList.add('hidden');
                    analyzeBtn.classList.remove('hidden');
                    resultContainer.classList.add('hidden');
                };
                reader.readAsDataURL(file);
            }
        };

        analyzeBtn.onclick = async () => {
            const file = fileInput.files[0];
            if (!file) return;

            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<div class="loader w-5 h-5 border-2 rounded-full"></div> جاري تحليل الصورة...';
            resultContainer.classList.remove('hidden');
            reportContent.innerHTML = "<p class='text-gray-400 p-5 text-center'>البوت يقرأ الأرقام ويقيم البطاقات... انتظر قليلاً.</p>";

            const base64Data = preview.src.split(',')[1];

            try {
                // استخدام gemini-1.5-pro لأنه الأقوى في قراءة النصوص من الصور (OCR)
                const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${KEY}`;
                
                // الأوامر الصارمة للبوت (Prompt Engineering)
                const promptText = `
                أنت خبير eFootball. انظر للصورة المرفقة واستخرج منها البيانات التالية بدقة:
                1. القوة الجماعية (Collective Strength) المكتوبة باللون الأصفر.
                2. قدر سعر الحساب بالدرهم المغربي (رقم تقريبي بناءً على اللاعبين).
                3. ملاحظة فنية عن التشكيلة.
                
                يجب أن يكون ردك حصرياً بصيغة JSON فقط، بدون أي كلام إضافي، بهذا الشكل:
                {
                    "strength": "رقم القوة هنا",
                    "price": "السعر المتوقع هنا",
                    "note": "ملاحظتك هنا"
                }`;

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{
                            parts: [
                                { text: promptText },
                                { inline_data: { mime_type: "image/jpeg", data: base64Data } }
                            ]
                        }]
                    })
                });

                const result = await response.json();

                if (result.candidates && result.candidates[0].content) {
                    let aiText = result.candidates[0].content.parts[0].text;
                    
                    // تنظيف الرد من أي علامات Markdown لضمان عمل JSON
                    aiText = aiText.replace(/```json/g, '').replace(/```/g, '').trim();
                    
                    let parsedData;
                    try {
                        parsedData = JSON.parse(aiText);
                    } catch (e) {
                        // في حال أخطأ البوت ولم يرسل JSON
                        parsedData = { strength: "تعذر القراءة", price: "غير محدد", note: aiText };
                    }

                    // وضع البيانات الحقيقية داخل التصميم!
                    const responseHtml = `
                    <div class="glass rounded-2xl p-6 border-l-4 border-yellow-500 animate-fade-in-up text-center max-w-lg mx-auto">
                        <div class="flex items-center justify-center gap-2 mb-5">
                            <svg class="w-6 h-6 text-yellow-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2l2.4 7.2h7.6l-6 4.8 2.4 7.2-6-4.8-6 4.8 2.4-7.2-6-4.8h7.6z"/></svg>
                            <h3 class="text-2xl font-bold text-gray-100">تقرير المهندس آلي (Pro)</h3>
                        </div>

                        <div class="bg-blue-600/20 rounded-xl p-5 mb-5 border border-blue-600/30">
                            <p class="text-gray-400 text-sm">قوة الفريق Collective Strength</p>
                            <h4 class="text-5xl font-black text-blue-400 mt-1 tracking-tighter">${parsedData.strength}</h4>
                        </div>

                        <div class="bg-gray-800/50 rounded-xl p-5 mb-5 border border-gray-700/50">
                            <p class="text-gray-400 text-sm">السعر المتوقع للحساب</p>
                            <h4 class="text-4xl font-bold text-yellow-500 mt-1 flex justify-center items-end gap-1">
                                <span class="text-5xl font-black">${parsedData.price}</span>
                                <span class="text-2xl font-normal text-gray-300 ml-1">د.م</span>
                            </h4>
                        </div>

                        <div class="bg-gray-800/30 rounded-xl p-4 text-right border border-gray-700/30">
                            <div class="flex items-center gap-2 mb-2">
                                <svg class="w-5 h-5 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                <p class="text-gray-300 font-medium text-sm">ملاحظة الذكاء الاصطناعي:</p>
                            </div>
                            <p class="text-gray-400 leading-relaxed text-sm">
                                ${parsedData.note}
                            </p>
                        </div>
                    </div>
                    `;
                    reportContent.innerHTML = responseHtml;
                } else {
                    reportContent.innerHTML = "<p class='text-red-400 p-5 text-center'>البوت لم يتمكن من رؤية الصورة بوضوح.</p>";
                }
            } catch (error) {
                reportContent.innerHTML = "<p class='text-red-400 p-5 text-center'>حدث خطأ في الاتصال بالخادم.</p>";
            } finally {
                analyzeBtn.disabled = false;
                analyzeBtn.innerHTML = 'ابدأ التحليل +5 🚀';
            }
        };
    </script>
</body>
</html>
